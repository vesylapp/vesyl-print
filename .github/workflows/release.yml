# Build signed OTA artifacts and publish to GitHub Releases (CDN).
#
# Trigger: push tag vX.Y.Z (must match VERSION file, or workflow bumps check).
#
# Required repo secret:
#   UPDATE_PRIVATE_KEY  — PEM for Ed25519 private key (pair of keys/update_public.pem)
#
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packaging ${VERSION} from tag ${TAG}"
          # Keep VERSION file in sync with the tag for the tarball
          echo "${VERSION}" > VERSION

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssl rsync

      - name: Build signed release
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_CHANNEL: stable
          OUT_DIR: ${{ github.workspace }}/dist
        run: |
          if [[ -z "${UPDATE_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: repo secret UPDATE_PRIVATE_KEY is not set" >&2
            echo "Generate with: openssl genpkey -algorithm Ed25519 -out update_private.pem" >&2
            echo "Public half must match keys/update_public.pem on devices." >&2
            exit 1
          fi
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "${{ steps.ver.outputs.version }}"
          ls -la dist/

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          TARBALL="dist/vesyl-print-${VERSION}-linux-aarch64.tar.gz"
          MANIFEST="dist/vesyl-print-${VERSION}.manifest.json"
          test -f "$TARBALL"
          test -f "$MANIFEST"
          # --generate-notes uses commits since previous tag
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$TARBALL" "$MANIFEST" --clobber
          else
            gh release create "$TAG" \
              "$TARBALL" \
              "$MANIFEST" \
              --title "vesyl-print ${VERSION}" \
              --generate-notes
          fi
          echo "Published:"
          echo "  https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          echo "  manifest: https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/vesyl-print-${VERSION}.manifest.json"
